<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>保健 一問一答</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
      background: #f5f0f8;
      color: #333;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: linear-gradient(135deg, #8b2252, #c0396e);
      color: white;
      padding: 18px 20px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }
    header h1 { font-size: 1.2rem; }

    #progress-wrap {
      background: #e8d4e8;
      height: 6px;
    }
    #progress-bar {
      height: 6px;
      background: linear-gradient(90deg, #8b2252, #c0396e);
      transition: width 0.4s ease;
      width: 0%;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
      padding: 30px 16px 40px;
      width: 100%;
      flex: 1;
    }

    #counter {
      text-align: center;
      font-size: 0.85rem;
      color: #999;
      margin-bottom: 20px;
    }

    #q-card {
      background: white;
      border-radius: 16px;
      padding: 28px 24px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
      border-left: 5px solid #c0396e;
      min-height: 180px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    #section-badge {
      display: inline-block;
      background: #f9e4ef;
      color: #8b2252;
      font-size: 0.75rem;
      font-weight: bold;
      padding: 3px 10px;
      border-radius: 100px;
      width: fit-content;
    }

    #q-text {
      font-size: 1.05rem;
      line-height: 1.8;
      font-weight: bold;
    }

    #input-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    #ans-input {
      flex: 1;
      border: 2px solid #ddd;
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 1.05rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
      min-width: 0;
    }
    #ans-input:focus { border-color: #c0396e; }
    #ans-input.correct-input {
      border-color: #2e9e5b;
      background: #edfaf3;
    }
    #ans-input.wrong-input {
      border-color: #e04040;
      background: #fff0f0;
      animation: shake 0.3s ease;
    }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25% { transform: translateX(-6px); }
      75% { transform: translateX(6px); }
    }

    #show-ans-btn {
      flex-shrink: 0;
      background: none;
      border: 1.5px solid #bbb;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 0.8rem;
      color: #777;
      cursor: pointer;
      font-family: inherit;
      white-space: nowrap;
      transition: all 0.15s;
    }
    #show-ans-btn:hover { border-color: #c0396e; color: #c0396e; background: #fdf0f5; }

    #feedback {
      text-align: center;
      font-size: 1.3rem;
      font-weight: bold;
      min-height: 36px;
    }
    #feedback.correct-fb { color: #2e9e5b; }
    #feedback.wrong-fb   { color: #e04040; }

    #next-btn {
      display: block;
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #8b2252, #c0396e);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      font-family: inherit;
      box-shadow: 0 4px 12px rgba(192,57,110,0.3);
      transition: transform 0.1s, opacity 0.2s;
      margin-top: 8px;
    }
    #next-btn:hover { transform: translateY(-1px); }
    #next-btn:disabled { opacity: 0.4; cursor: default; transform: none; }

    #result-screen {
      display: none;
      background: white;
      border-radius: 16px;
      padding: 36px 24px;
      text-align: center;
      box-shadow: 0 4px 16px rgba(0,0,0,0.1);
    }
    #result-screen h2 { font-size: 1.4rem; color: #8b2252; margin-bottom: 16px; }
    #result-score { font-size: 3.5rem; font-weight: bold; color: #c0396e; line-height: 1; }
    #result-sub { font-size: 1rem; color: #888; margin: 8px 0 20px; }
    #result-msg { font-size: 1.1rem; margin-bottom: 24px; }
    #result-bar-wrap { background: #f0e0ea; border-radius: 100px; height: 14px; margin: 0 0 24px; overflow: hidden; }
    #result-bar { height: 100%; border-radius: 100px; background: linear-gradient(90deg, #8b2252, #c0396e); width: 0%; transition: width 1s ease; }

    .btn-retry {
      display: block;
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #8b2252, #c0396e);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      font-family: inherit;
      box-shadow: 0 4px 12px rgba(192,57,110,0.3);
    }
  </style>
</head>
<body>

<header>
  <h1>📖 保健 一問一答（01・06章）</h1>
</header>
<div id="progress-wrap"><div id="progress-bar"></div></div>

<div class="container">
  <div id="counter"></div>

  <div id="q-card">
    <div id="section-badge"></div>
    <div id="q-text"></div>
    <div id="input-row" style="display:none">
      <input type="text" id="ans-input" placeholder="答えを入力" autocomplete="off" />
      <button id="show-ans-btn">答えを見る</button>
    </div>
    <div id="feedback"></div>
  </div>

  <button id="next-btn" disabled>次の問題 →</button>

  <div id="result-screen">
    <h2>🎉 テスト終了！</h2>
    <div id="result-score"></div>
    <div id="result-sub"></div>
    <div id="result-bar-wrap"><div id="result-bar"></div></div>
    <div id="result-msg"></div>
    <button class="btn-retry" onclick="startQuiz()">🔄 もう一度チャレンジ</button>
  </div>
</div>

<script>
const questions = [
  // ── 01 ライフステージと健康 ──
  { section: '01 ライフステージと健康', q: '私たちの心や体はある年齢までは発育・発達していきますが、その後それは止まり、何が始まりますか？', ans: '老化' },
  { section: '01 ライフステージと健康', q: '就学、就職、結婚、出産、育児、退職などのさまざまなできごとを何といいますか？', ans: 'ライフイベント' },
  { section: '01 ライフステージと健康', q: '人生をできごとをもとに乳幼児期、学童期、思春期、青年期、中年期、高年期などと段階に分けたものを何といいますか？', ans: 'ライフステージ' },
  { section: '01 ライフステージと健康', q: 'ライフステージによって健康の状況や何が変化していきますか？', ans: '健康課題' },
  { section: '01 ライフステージと健康', q: '0〜4歳をのぞくと年齢が増すごとに増えているのは何ですか？', ans: '死亡率' },
  { section: '01 ライフステージと健康', q: '若い人に多い病気もありますが、加齢とともに多くなる病気として本文で例に挙げられているものは何ですか？', ans: '精神疾患' },
  { section: '01 ライフステージと健康', q: '高い水準にあるわが国の80歳においては、男性の62.9％、女性の81.2％が生存しています。何が高い水準にあるのですか？', ans: '平均寿命' },
  { section: '01 ライフステージと健康', q: '乳幼児期には、先天的な異常や出産などにともなう死亡が多く、また、窒息、何などの事故による死亡も若干多くなっていますか？', ans: '溺水' },
  { section: '01 ライフステージと健康', q: '学童期・思春期になると、性行動、何、出産、育児などの性にかかわる課題が生まれますか？', ans: '妊娠' },
  { section: '01 ライフステージと健康', q: '働くこととのかかわりで身体活動の減少や何といった健康課題が生じますか？', ans: '労働災害' },
  { section: '01 ライフステージと健康', q: '加齢にともない徐々に何などの健康課題に直面しますか？', ans: '生活習慣病' },
  { section: '01 ライフステージと健康', q: '乳幼児期や学童期などの子どもの健康や福祉に対して、児童福祉法などのほかにつくられた法律を1つ答えてください（2つのうち1つ目）。', ans: '母子保健法' },
  { section: '01 ライフステージと健康', q: '乳幼児期や学童期などの子どもの健康や福祉に対して、児童福祉法などのほかにつくられた法律を1つ答えてください（2つのうち2つ目）。', ans: '学校保健安全法' },
  { section: '01 ライフステージと健康', q: '法律がつくられたことにより、医療のほかにおこなわれていることを1つ答えてください（2つのうち1つ目）。', ans: '健康診断' },
  { section: '01 ライフステージと健康', q: '法律がつくられたことにより、医療のほかにおこなわれていることを1つ答えてください（2つのうち2つ目）。', ans: '保健指導' },
  { section: '01 ライフステージと健康', q: '2018年には何ができ、妊娠・出産から子どもが生まれ育ち成人するまで、切れ目のない支援のための環境整備をめざすことになりましたか？', ans: '成育基本法' },
  { section: '01 ライフステージと健康', q: '高齢者に対しては、高齢者の医療の確保に関する法律や何法などがありますか？', ans: '介護保険法' },
  { section: '01 ライフステージと健康', q: '高齢者に対して提供されているのは、医療と何ですか？', ans: '介護' },
  { section: '01 ライフステージと健康', q: '（資料2より）学童期・思春期の健康課題の例として、むし歯のほかに挙げられている疾患は何ですか？', ans: 'アレルギー疾患' },
  { section: '01 ライフステージと健康', q: '（資料2より）高年期の健康課題の例として、生活習慣病、骨折、交通事故（加害者）のほかに挙げられている目の疾患は何ですか？', ans: '白内障' },

  // ── 06 結婚生活と健康 ──
  { section: '06 結婚生活と健康', q: '結婚は、何で定められ、社会的に認められた夫婦の関係ですか？', ans: '法律' },
  { section: '06 結婚生活と健康', q: '結婚生活には、多くの場合、子どもを産み育てる営みがともなうため、何が十分に発達していることは結婚の大切な要件ですか？', ans: '生殖機能' },
  { section: '06 結婚生活と健康', q: '年齢によって、何など、出産にともなう健康問題が起こる危険性が高くなりますか？', ans: '死産' },
  { section: '06 結婚生活と健康', q: '（コラムより）生殖可能な年齢で、避妊をしていないにもかかわらず1年以上妊娠しない状態を何といいますか？', ans: '不妊' },
  { section: '06 結婚生活と健康', q: '結婚は、これまで異なる生活をしていた者どうしの何の始まりですか？', ans: '共同生活' },
  { section: '06 結婚生活と健康', q: '結婚生活でのさまざまなことがらに対して、パートナーと何して対処していくことが求められますか？', ans: '協力' },
  { section: '06 結婚生活と健康', q: '互いを認めあい、健康に対する何や思いやりなどをもつなど、良好な人間関係を築いていくことが必要ですか？', ans: '責任感' },
  { section: '06 結婚生活と健康', q: '良好な人間関係を築いていくことが必要であるため、何面の発達も欠かすことができませんか？', ans: '精神面' },
  { section: '06 結婚生活と健康', q: '結婚に際しては、互いの何を知っておくことが必要ですか？', ans: '健康状態' },
  { section: '06 結婚生活と健康', q: '互いの健康状態を知っていれば、感染症や何的な病気をもっている場合にも対策をとることができますか？', ans: '遺伝' },
  { section: '06 結婚生活と健康', q: '運動、食事、休養・睡眠といった何を指して、本人のみならず家族の健康に強く関係すると書かれていますか？', ans: '生活習慣' },
  { section: '06 結婚生活と健康', q: 'バランスの整った食事をとるなどの親のよい何は、子どものよいそれの形成を促進しますか？', ans: '食習慣' },
  { section: '06 結婚生活と健康', q: '結婚生活には、家族の健康への何がともなうのですか？', ans: '責任' },
  { section: '06 結婚生活と健康', q: '近年増えている、同居する家族から受ける家庭内での暴力などのパートナーを傷つける行為を、アルファベット2文字で何といいますか？', ans: 'DV' },
  { section: '06 結婚生活と健康', q: '近年増えている、子どもに対する暴行や養育の放棄などを何といいますか？', ans: '児童虐待' },
  { section: '06 結婚生活と健康', q: '（資料3より）殴る、蹴る、つねる、激しく揺さぶる、やけどを負わせるなどの暴行を加えることを何的虐待といいますか？', ans: '身体的虐待' },
  { section: '06 結婚生活と健康', q: '（資料3より）言葉による脅し、無視、兄弟姉妹間の差別、子どもの前での配偶者への暴力などにより著しい心理的外傷を与えることを何的虐待といいますか？', ans: '心理的虐待' },
  { section: '06 結婚生活と健康', q: '（資料3より）性行為の強要、わいせつな行為などをすることを何的虐待といいますか？', ans: '性的虐待' },
  { section: '06 結婚生活と健康', q: '（資料3より）病院に連れて行かない、学校に行かせない、食事を与えない、車の中に放置するなど、保護者としての監護を著しく怠ること（保護の怠慢、養育の放棄）をカタカナで何といいますか？', ans: 'ネグレクト' },
];

let idx = 0, correct = 0, answered = false, showing = false;
let order = [];

function normalize(s) {
  return s.trim().replace(/\s+/g, '')
    .replace(/[Ａ-Ｚａ-ｚ０-９]/g, c => String.fromCharCode(c.charCodeAt(0) - 0xFEE0));
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function startQuiz() {
  idx = 0; correct = 0; answered = false; showing = false;
  order = shuffle([...Array(questions.length).keys()]);
  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('q-card').style.display = 'flex';
  document.getElementById('counter').style.display = 'block';
  document.getElementById('next-btn').style.display = 'block';
  loadQuestion();
}

function loadQuestion() {
  answered = false;
  showing = false;
  const q = questions[order[idx]];
  const total = questions.length;

  document.getElementById('counter').textContent = `${idx + 1} / ${total}`;
  document.getElementById('progress-bar').style.width = (idx / total * 100) + '%';
  document.getElementById('section-badge').textContent = q.section;
  document.getElementById('q-text').textContent = q.q;
  document.getElementById('feedback').textContent = '';
  document.getElementById('feedback').className = '';

  const nextBtn = document.getElementById('next-btn');
  nextBtn.disabled = true;
  nextBtn.textContent = idx + 1 < total ? '次の問題 →' : '結果を見る';

  document.getElementById('input-row').style.display = 'flex';
  const inp = document.getElementById('ans-input');
  inp.value = '';
  inp.className = '';
  inp.placeholder = '答えを入力';
  inp.disabled = false;
  inp.focus();

  const showBtn = document.getElementById('show-ans-btn');
  showBtn.textContent = '答えを見る';
  showBtn.onclick = () => {
    showing = !showing;
    inp.placeholder = showing ? q.ans : '答えを入力';
    showBtn.textContent = showing ? '隠す' : '答えを見る';
  };
}

document.getElementById('ans-input').addEventListener('input', () => {
  if (answered) return;
  const q = questions[order[idx]];
  const inp = document.getElementById('ans-input');
  const userVal = normalize(inp.value);
  const correctVal = normalize(q.ans);
  const isOk = userVal === correctVal ||
    (correctVal.includes(userVal) && userVal.length >= 2 && userVal.length >= correctVal.length - 1);
  if (isOk) {
    answered = true;
    correct++;
    inp.classList.add('correct-input');
    inp.disabled = true;
    showFeedback(true, q.ans);
    document.getElementById('next-btn').disabled = false;
  }
});

function showFeedback(isOk, hint) {
  const fb = document.getElementById('feedback');
  if (isOk) {
    fb.textContent = '✅ 正解！';
    fb.className = 'correct-fb';
  } else {
    fb.textContent = `❌ 不正解　正解：${hint}`;
    fb.className = 'wrong-fb';
    const inp = document.getElementById('ans-input');
    if (!inp.disabled) {
      inp.classList.add('wrong-input');
      setTimeout(() => inp.classList.remove('wrong-input'), 400);
    }
  }
}

document.getElementById('show-ans-btn').addEventListener('click', () => {
  if (answered) return;
  const q = questions[order[idx]];
  answered = true;
  const inp = document.getElementById('ans-input');
  inp.disabled = true;
  showFeedback(false, q.ans);
  document.getElementById('next-btn').disabled = false;
});

document.getElementById('next-btn').addEventListener('click', () => {
  if (!answered) return;
  idx++;
  if (idx >= questions.length) {
    showResult();
  } else {
    loadQuestion();
  }
});

document.getElementById('ans-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && answered) {
    document.getElementById('next-btn').click();
  }
});

function showResult() {
  const total = questions.length;
  const pct = Math.round(correct / total * 100);
  document.getElementById('q-card').style.display = 'none';
  document.getElementById('counter').style.display = 'none';
  document.getElementById('next-btn').style.display = 'none';
  document.getElementById('progress-bar').style.width = '100%';

  const rs = document.getElementById('result-screen');
  rs.style.display = 'block';
  document.getElementById('result-score').textContent = `${pct}%`;
  document.getElementById('result-sub').textContent = `${correct} / ${total} 問正解`;

  let msg = '';
  if (pct === 100) msg = '🎉 満点！完璧です！';
  else if (pct >= 80) msg = '👏 よくできました！';
  else if (pct >= 60) msg = '📚 もう少し復習しましょう！';
  else msg = '💪 教科書を見直してもう一度！';
  document.getElementById('result-msg').textContent = msg;

  setTimeout(() => {
    document.getElementById('result-bar').style.width = pct + '%';
  }, 100);
}

startQuiz();
</script>
</body>
</html>
